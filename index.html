<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Game of Life</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="tool-strip">
    <div class="tool-group">
      <button id="btn-play" class="tool-btn">Play</button>
      <button id="btn-step" class="tool-btn">Step</button>
      <button id="btn-clear" class="tool-btn">Clear</button>
      <button id="btn-seed" class="tool-btn">Random</button>
      <button id="btn-center" class="tool-btn">Center</button>
    </div>
    <div class="tool-group tool-modes">
      <button id="btn-mode-pan" class="tool-btn active">Pan</button>
      <button id="btn-mode-draw" class="tool-btn">Draw</button>
    </div>
    <div class="tool-group tool-rules">
      <select id="rule-select" class="tool-select">
        <option value="conway">Conway</option>
        <option value="highlife">HighLife</option>
        <option value="seeds">Seeds</option>
      </select>
    </div>
    <div class="tool-group tool-brush">
      <button class="tool-btn brush-btn active" data-size="1">1x</button>
      <button class="tool-btn brush-btn" data-size="3">3x</button>
      <button class="tool-btn brush-btn" data-size="5">5x</button>
    </div>
    <div class="tool-group tool-patterns">
      <button class="tool-btn pat-btn" data-pat="glider">Glider</button>
      <button class="tool-btn pat-btn" data-pat="lwss">Ship</button>
      <button class="tool-btn pat-btn" data-pat="pulsar">Pulsar</button>
    </div>
    <div class="tool-group tool-io">
      <button id="btn-save" class="tool-btn">Save</button>
      <button id="btn-load" class="tool-btn">Load</button>
      <input type="file" id="file-input" accept=".json">
    </div>
    <div class="tool-group tool-speed">
      <label for="speed-range">Speed</label>
      <input type="range" id="speed-range" min="16" max="500" value="120">
    </div>
    <div class="tool-group tool-info">
      <canvas id="pop-graph" width="120" height="24"></canvas>
      <span id="gen-count">Gen: 0</span>
      <span id="cell-count">Cells: 0</span>
    </div>
  </div>
  <canvas id="game-board"></canvas>
  <script src="script.js"></script>
</body>
</html>
